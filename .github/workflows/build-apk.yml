name: Build APK with WASM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup WABT
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Compile WAT to WASM
        run: |
          for watfile in $(find app/src/main/assets -name "*.wat"); do
            wasmfile="${watfile%.wat}.wasm"
            wat2wasm "$watfile" -o "$wasmfile"
            echo "Compiled $watfile -> $wasmfile"
          done

      - name: Setup Java & Gradle
        run: |
          sudo apt-get install -y openjdk-17-jdk-headless
          sudo apt-get install -y gradle

      - name: Build APK
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
